<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eric Brock</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <span class="brand is-home">ERIC BROCK</span>
  <nav>
    <a href="/work/">work</a>
    <a href="/coaching/">coaching</a>
    <a href="/about/">about</a>
  </nav>
</header>
<section class="hero">
  <div class="hero-column-frame">
    <img class="hero-column" src="/assets/column_drawing.svg" alt="">
  </div>
  <main class="home">
    <div id="home-name" class="home-name">ERIC BROCK</div>
  </main>
</section>
<script>
(function () {
  var el = document.getElementById('home-name');
  var text = el.textContent;
  var glyphs = '/\\|.:-+*#';
  el.innerHTML = '';
  var spans = [];
  for (var i = 0; i < text.length; i++) {
    var ch = text[i];
    var s = document.createElement('span');
    s.textContent = ch;
    s.style.display = 'inline-block';
    s.dataset.orig = ch;
    el.appendChild(s);
    if (ch !== ' ') spans.push(s);
  }

  var cursor = document.createElement('span');
  cursor.textContent = '_';
  cursor.className = 'home-cursor';
  el.appendChild(cursor);

  var radius = 120;
  var mx = -9999, my = -9999;
  var ticking = false;

  function render() {
    ticking = false;
    spans.forEach(function (s) {
      var r = s.getBoundingClientRect();
      var cx = r.left + r.width / 2;
      var cy = r.top + r.height / 2;
      var dx = mx - cx;
      var dy = my - cy;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < radius) {
        var force = 1 - dist / radius;
        if (Math.random() < force) {
          s.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
        } else {
          s.textContent = s.dataset.orig;
        }
      } else {
        s.textContent = s.dataset.orig;
      }
    });
  }

  function schedule() {
    if (!ticking) {
      ticking = true;
      requestAnimationFrame(render);
    }
  }

  window.addEventListener('mousemove', function (e) {
    mx = e.clientX;
    my = e.clientY;
    schedule();
  });

  window.addEventListener('mouseleave', function () {
    mx = -9999;
    my = -9999;
    schedule();
  });
})();
</script>
</body>
</html>
